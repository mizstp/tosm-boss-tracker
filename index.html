<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSM Boss Respawn Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements"></div>
    
    <div id="app" class="container">
        
        <!-- Authentication View -->
        <main id="auth-view" class="view active card-glass">
            <div class="auth-header">
                <h1>TOSM Tracker</h1>
                <p>Boss Respawn Sync</p>
            </div>
            
            <form id="auth-form" class="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="character@tosm.world">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <p id="auth-error" class="error-msg"></p>

                <div class="auth-actions">
                    <button type="submit" id="login-btn" class="btn primary-btn">Login</button>
                    <button type="button" id="register-btn" class="btn outline-btn">Register</button>
                </div>
            </form>
        </main>

        <!-- Main Dashboard View -->
        <main id="dashboard-view" class="view">
            <header class="app-header card-glass">
                <h2>Boss Tracker</h2>
                <div class="header-actions">
                    <span id="user-display-email"></span>
                    <button id="logout-btn" class="btn danger-btn sm-btn">Logout</button>
                </div>
            </header>

            <div class="tabs-container card-glass">
                <div class="tabs-scroll" id="map-tabs">
                    <!-- Tabs go here -->
                </div>
                <button id="add-tab-btn" class="btn icon-btn" title="Add Map Tab">+</button>
            </div>

            <div class="boss-board card-glass">
                <div class="board-header">
                    <h3 id="current-map-title">Select a Map</h3>
                    <div style="display: flex; gap: 0.5rem;" id="board-actions">
                        <button id="delete-map-btn" class="btn outline-btn sm-btn" style="display: none; border-color: var(--danger); color: var(--danger);">Delete Map</button>
                        <button id="add-boss-btn" class="btn primary-btn sm-btn" style="display: none;">Add Boss</button>
                    </div>
                </div>
                
                <div class="boss-list" id="boss-list">
                    <!-- Boss cards will be injected here -->
                    <div class="empty-state">No map selected or no bosses yet.</div>
                </div>
            </div>
        </main>

        <!-- New Map Modal -->
        <div id="map-modal" class="modal">
            <div class="modal-content card-glass">
                <h3>Add New Map</h3>
                <input type="text" id="new-map-name" placeholder="Map Name (e.g. West Siauliai Woods)">
                <div class="modal-actions">
                    <button id="cancel-map-btn" class="btn text-btn">Cancel</button>
                    <button id="save-map-btn" class="btn primary-btn">Save Map</button>
                </div>
            </div>
        </div>

        <!-- New Boss Modal -->
        <div id="boss-modal" class="modal">
            <div class="modal-content card-glass">
                <h3>Add New Boss</h3>
                <div class="input-group">
                    <label>Boss Name</label>
                    <input type="text" id="new-boss-name" placeholder="E.g. Chapparition">
                </div>
                <div class="input-group">
                    <label>Respawn Time (Minutes)</label>
                    <input type="number" id="new-boss-time" placeholder="E.g. 120">
                </div>
                <div class="modal-actions">
                    <button id="cancel-boss-btn" class="btn text-btn">Cancel</button>
                    <button id="save-boss-btn" class="btn primary-btn">Save Boss</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Main Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
