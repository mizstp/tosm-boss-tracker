<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSM Boss Respawn Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements"></div>
    
    <div id="app" class="container">
        
        <!-- Authentication View -->
        <main id="auth-view" class="view active card-glass">
            <div class="auth-header">
                <h1>TOSM Tracker</h1>
                <p>Boss Respawn Sync</p>
            </div>
            
            <div id="auth-form" class="auth-form">
                <p id="auth-error" class="error-msg"></p>
                <div class="auth-actions" style="justify-content: center;">
                    <button type="button" id="google-login-btn" class="btn outline-btn" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; border-color: rgba(255,255,255,0.3); padding: 1rem;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Sign in with Google
                    </button>
                </div>
            </div>
        </main>

        <!-- Main Dashboard View -->
        <main id="dashboard-view" class="view">
            <header class="app-header card-glass">
                <h2>Boss Tracker</h2>
                <div class="header-actions">
                    <span id="user-display-email"></span>
                    <button id="logout-btn" class="btn danger-btn sm-btn">Logout</button>
                </div>
            </header>

            <div class="tabs-container card-glass">
                <div class="tabs-scroll" id="map-tabs">
                    <!-- Tabs go here -->
                </div>
                <button id="add-tab-btn" class="btn icon-btn" title="Add Map Tab">+</button>
            </div>

            <div class="boss-board card-glass">
                <div class="board-header">
                    <h3 id="current-map-title">Select a Map</h3>
                    <div style="display: flex; gap: 0.5rem;" id="board-actions">
                        <button id="delete-map-btn" class="btn outline-btn sm-btn" style="display: none; border-color: var(--danger); color: var(--danger);">Delete Map</button>
                        <button id="add-boss-btn" class="btn primary-btn sm-btn" style="display: none;">Add Channel</button>
                    </div>
                </div>
                
                <div class="boss-list" id="boss-list">
                    <!-- Boss cards will be injected here -->
                    <div class="empty-state">No map selected or no channels yet.</div>
                </div>
            </div>
        </main>

        <!-- New Map Modal -->
        <div id="map-modal" class="modal">
            <div class="modal-content card-glass">
                <h3>Add New Map</h3>
                <input type="text" id="new-map-name" placeholder="Map Name (e.g. West Siauliai Woods)">
                <div class="modal-actions">
                    <button id="cancel-map-btn" class="btn text-btn">Cancel</button>
                    <button id="save-map-btn" class="btn primary-btn">Save Map</button>
                </div>
            </div>
        </div>

        <!-- New Boss Modal -->
        <div id="boss-modal" class="modal">
            <div class="modal-content card-glass">
                <h3>Add New Channel</h3>
                <div class="input-group">
                    <label>Channel Number</label>
                    <input type="number" id="new-boss-name" placeholder="E.g. 1">
                </div>
                <div class="input-group">
                    <label>Respawn Time (HH:MM)</label>
                    <input type="text" id="new-boss-time" placeholder="E.g. 02:00">
                </div>
                <div class="modal-actions">
                    <button id="cancel-boss-btn" class="btn text-btn">Cancel</button>
                    <button id="save-boss-btn" class="btn primary-btn">Save Channel</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Main Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
